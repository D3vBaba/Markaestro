runConfig:
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Client-side Firebase config (available at build + runtime)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBSyzoIBbqmk9iBBE2qu4fzcw4ib6-Le08
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: markaestro.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: markaestro-0226220726
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: markaestro-0226220726.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "227206788749"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:227206788749:web:3b4e8c1b6e9bfeb1cdd4c4
    availability:
      - BUILD
      - RUNTIME

  # App URL for OAuth callbacks
  - variable: NEXT_PUBLIC_APP_URL
    value: https://markaestro.com
    availability:
      - BUILD
      - RUNTIME
  - variable: OAUTH_BASE_URL
    value: https://markaestro.com
    availability:
      - RUNTIME
  - variable: TIKTOK_OAUTH_REDIRECT_URI
    value: https://markaestro.com/api/oauth/callback/tiktok
    availability:
      - RUNTIME
  - variable: TIKTOK_ADS_OAUTH_REDIRECT_URI
    value: https://markaestro.com/api/oauth/callback/tiktok_ads
    availability:
      - RUNTIME
  - variable: INSTAGRAM_OAUTH_REDIRECT_URI
    value: https://markaestro.com/api/oauth/callback/instagram
    availability:
      - RUNTIME
  - variable: LINKEDIN_OAUTH_REDIRECT_URI
    value: https://markaestro.com/api/oauth/callback/linkedin
    availability:
      - RUNTIME

  # Stripe — price IDs are public identifiers (same as .env.local)
  - variable: STRIPE_PRICE_STARTER_MONTHLY
    value: price_1TG1vdJUPkOCaFhqr4b27fQi
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_STARTER_ANNUAL
    value: price_1TG1veJUPkOCaFhqbxBRDHbM
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_PRO_MONTHLY
    value: price_1TG1veJUPkOCaFhqJ9daSoBl
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_PRO_ANNUAL
    value: price_1TG1veJUPkOCaFhqOj9zP9g8
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_BUSINESS_MONTHLY
    value: price_1TG1vfJUPkOCaFhqoFXzBe2C
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_BUSINESS_ANNUAL
    value: price_1TG1vfJUPkOCaFhqdLdh15m8
    availability:
      - RUNTIME

  # Stripe — create these secrets in Google Cloud Secret Manager (same names)
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
  # Live publishable key (pk_live_…) — safe to expose in the browser
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: STRIPE_PUBLISHABLE_KEY
    availability:
      - BUILD
      - RUNTIME

  # Sentry error tracking (client-side DSN is safe to expose)
  - variable: NEXT_PUBLIC_SENTRY_DSN
    secret: SENTRY_DSN

  # Server-side secrets (from Google Secret Manager)
  - variable: SERPER_API_KEY
    secret: SERPER_API_KEY
  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
  - variable: WORKER_SECRET
    secret: WORKER_SECRET
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON

  # OAuth provider credentials
  - variable: META_APP_ID
    secret: META_APP_ID
  - variable: META_APP_SECRET
    secret: META_APP_SECRET
  - variable: INSTAGRAM_APP_ID
    secret: INSTAGRAM_APP_ID
  - variable: INSTAGRAM_APP_SECRET
    secret: INSTAGRAM_APP_SECRET
  - variable: TIKTOK_CLIENT_KEY
    secret: TIKTOK_CLIENT_KEY
  - variable: TIKTOK_CLIENT_SECRET
    secret: TIKTOK_CLIENT_SECRET
  - variable: TIKTOK_ADS_APP_ID
    secret: TIKTOK_ADS_APP_ID
  - variable: TIKTOK_ADS_CLIENT_KEY
    secret: TIKTOK_ADS_CLIENT_KEY
  - variable: TIKTOK_ADS_CLIENT_SECRET
    secret: TIKTOK_ADS_CLIENT_SECRET
  - variable: LINKEDIN_CLIENT_ID
    secret: LINKEDIN_CLIENT_ID
  - variable: LINKEDIN_CLIENT_SECRET
    secret: LINKEDIN_CLIENT_SECRET
