runConfig:
  # Scale to zero when idle to eliminate continuous charges. The first
  # request after an idle period takes 4–8s to compile the Next.js standalone
  # runtime + initialise firebase-admin + Secret Manager — accepted tradeoff.
  minInstances: 0
  maxInstances: 10
  # Sharp, OpenAI SDK, firebase-admin, and parallel Gemini calls comfortably
  # push memory above the default 512 MiB under load. 1 GiB + 1 vCPU gives
  # us headroom without doubling cost.
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  # Image-generation and enrichment routes can run >30s. Raise the request
  # timeout close to Cloud Run's hard ceiling.
  timeoutSeconds: 300

